<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sanjar pufakchalari - chiroyli animatsiya">
  <title>Sanjar Pufakchalari ✨</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #87ceeb;
      overflow: hidden;
      font-family: Helvetica, sans-serif;
      height: 100vh;
      width: 100vw;
    }
    canvas {
      display: block;
      width: 100vw;
      height: 100vh;
    }
    #title {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: white;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 0 2px 8px rgba(0,60,120,0.4);
      letter-spacing: 4px;
      pointer-events: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="title">✨ SANJAR ✨</div>
  <canvas id="c"></canvas>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const W = () => canvas.width;
    const H = () => canvas.height;

    class Bubble {
      constructor(init) {
        this.reset(init);
      }
      reset(init) {
        this.r = 40 + Math.random() * 35;
        this.x = this.r + Math.random() * (W() - this.r * 2);
        this.y = init ? Math.random() * H() : H() + Math.random() * 200 + this.r;
        this.dy = 0.8 + Math.random() * 1.4;
        this.dx = (Math.random() - 0.5) * 0.8;
        this.alpha = 0.45 + Math.random() * 0.45;
        this.wobble = Math.random() * Math.PI * 2;
        this.wobbleSpeed = 0.015 + Math.random() * 0.01;
      }
      update() {
        this.wobble += this.wobbleSpeed;
        this.x += this.dx + Math.sin(this.wobble) * 0.4;
        this.y -= this.dy;
        if (this.y + this.r < -30 || this.x < -100 || this.x > W() + 100) {
          this.reset(false);
        }
      }
      draw() {
        // bubble body
        ctx.save();
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.r, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(
          this.x - this.r * 0.2, this.y - this.r * 0.2, this.r * 0.05,
          this.x, this.y, this.r
        );
        grad.addColorStop(0, 'rgba(255,255,255,0.75)');
        grad.addColorStop(0.5, 'rgba(200,230,255,0.4)');
        grad.addColorStop(1, 'rgba(136,201,255,0.2)');
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = 'rgba(136,201,255,0.9)';
        ctx.lineWidth = 2.5;
        ctx.stroke();
        ctx.restore();

        // shine top
        ctx.save();
        ctx.globalAlpha = this.alpha * 0.5;
        ctx.beginPath();
        ctx.arc(this.x - this.r * 0.28, this.y - this.r * 0.3, this.r * 0.38, 0, Math.PI * 2);
        const shineGrad = ctx.createRadialGradient(
          this.x - this.r * 0.28, this.y - this.r * 0.35, 0,
          this.x - this.r * 0.28, this.y - this.r * 0.3, this.r * 0.38
        );
        shineGrad.addColorStop(0, 'rgba(255,255,255,0.9)');
        shineGrad.addColorStop(1, 'rgba(255,255,255,0)');
        ctx.fillStyle = shineGrad;
        ctx.fill();
        ctx.restore();

        // text
        ctx.save();
        ctx.globalAlpha = Math.min(1, this.alpha + 0.25);
        const fs = Math.max(10, Math.round(this.r / 3));
        ctx.font = `bold ${fs}px Helvetica, Arial, sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillStyle = '#0055bb';
        ctx.shadowColor = 'rgba(0,80,200,0.3)';
        ctx.shadowBlur = 4;
        ctx.fillText('SANJAR', this.x, this.y);
        ctx.restore();
      }
    }

    const COUNT = 14;
    const bubbles = Array.from({ length: COUNT }, () => new Bubble(true));

    function loop() {
      // sky gradient background
      const sky = ctx.createLinearGradient(0, 0, 0, H());
      sky.addColorStop(0, '#5ba8d4');
      sky.addColorStop(1, '#a8d8f0');
      ctx.fillStyle = sky;
      ctx.fillRect(0, 0, W(), H());

      bubbles.forEach(b => { b.update(); b.draw(); });
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
